# Cloudflare Pages Configuration
name = "confession-app"
compatibility_date = "2024-03-20"

# Build settings
[build]
command = "npm run build"
dir = "dist"

# Environment variables for Pages
[env.production]
# These are set in the Cloudflare Dashboard
# VITE_API_URL - URL of your Worker
# VITE_TURNSTILE_SITE_KEY - Turnstile site key

[[env.production.vars]]
VITE_API_URL = "https://confession-worker.your-subdomain.workers.dev"

[env.preview]
# Preview environment
[[env.preview.vars]]
VITE_API_URL = "https://confession-worker-dev.your-subdomain.workers.dev"
