name = "confession-worker"
main = "src/index.ts"
compatibility_date = "2024-03-20"

# Cloudflare D1 Database
[[d1_databases]]
binding = "DB"
database_name = "confession-db"
database_id = "your-database-id-here"  # Will be filled after creating the database

# Environment Variables
[vars]
# These are public vars - secrets should use wrangler secret put
TURNSTILE_SITE_KEY = "your-turnstile-site-key"

# Secrets (set via wrangler secret put):
# - TURNSTILE_SECRET_KEY
# - ADMIN_API_KEY

# Development environment
[env.dev]
name = "confession-worker-dev"

# Production environment
[env.production]
name = "confession-worker"
