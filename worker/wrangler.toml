name = "confession-worker"
main = "src/index.ts"
compatibility_date = "2024-03-20"

# Cloudflare D1 Database (production)
[[d1_databases]]
binding = "DB"
database_name = "confession-db"
database_id = "57274022-804f-4f55-a893-423f67e340f4"

# Environment Variables
[vars]
# These are public vars - secrets should use wrangler secret put
TURNSTILE_SITE_KEY = "0x4AAAAAACmVdC9C4pvlFgCx"

# Secrets (set via wrangler secret put):
# - TURNSTILE_SECRET_KEY
# - ADMIN_API_KEY
# - THREADS_ACCESS_TOKEN (optional - for auto-posting to Threads)
# - THREADS_USER_ID (optional - your Threads user ID)

# Development environment
[env.dev]
name = "confession-worker-dev"

# Production environment
[env.production]
name = "confession-worker"
