name = "confession-worker"
main = "src/index.ts"
compatibility_date = "2024-03-20"

# Cloudflare D1 Database
[[d1_databases]]
binding = "DB"
database_name = "confession-db"
database_id = "fcde7e18-8c8c-4761-8dd5-8608ae876e23"  # Will be filled after creating the database

# Environment Variables
[vars]
# These are public vars - secrets should use wrangler secret put
TURNSTILE_SITE_KEY = "0x4AAAAAACmVdC9C4pvlFgCx"

# Secrets (set via wrangler secret put):
# - TURNSTILE_SECRET_KEY
# - ADMIN_API_KEY

# Development environment
[env.dev]
name = "confession-worker-dev"

# Production environment
[env.production]
name = "confession-worker"
